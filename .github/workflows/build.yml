name: build-installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install . pyside6 pyinstaller
      - run: pwsh build/build_windows.ps1
      - run: Compress-Archive -Path dist/chaosRouter -DestinationPath chaosRouter-windows.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: chaosRouter-windows
          path: chaosRouter-windows.zip

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install . pyside6 pyinstaller
      - run: bash build/build_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: chaosRouter-macos
          path: dist/chaosRouter-macos.zip

  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            chaosRouter-windows.zip
            chaosRouter-macos.zip
